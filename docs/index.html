<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SKKOA Docs</title>
        <link rel="icon" href="/image/skkoa_logo_remove_background_large.png" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/wan2land/d2coding/d2coding-full.css"
        />
        <link rel="stylesheet" href="/style.css" />
        <link rel="stylesheet" href="docs.css" />
        <script src="/script.js" defer></script>
        <script src="docs.js" defer></script>
        <script
            type="module"
            src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"
        ></script>
    </head>
    <body>
        <header class="main-header">
            <div class="header-left">
                <img
                    src="/image/skkoa_logo_remove_background_large.png"
                    alt="SKKOA Logo"
                    class="logo"
                />
                <div class="header-text">
                    <h1>SKKOA Docs</h1>
                    <p>Starter Kit with Korean Oriented Architecture</p>
                </div>
            </div>
            <nav class="header-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/compiler/" class="nav-link">Compiler</a>
                <a href="/download/" class="nav-link">Download</a>
            </nav>
        </header>
        <main class="docs-shell">
            <aside class="docs-sidebar" aria-label="문서 목차">
                <div class="docs-sidebar-title">문서</div>
                <nav id="docsNav" class="docs-nav"></nav>
            </aside>
            <section class="docs-reader intro-section">
                <div class="docs-reader-header">
                    <span class="support-tag support-now">현재 지원</span>
                    <span class="support-tag support-planned">설계됨 / 예정</span>
                </div>
                <zero-md id="docReader" src="text/index.md">
                    <template data-append>
                        <link rel="stylesheet" href="markdown.css" />
                    </template>
                </zero-md>
            </section>
            <div class="fixed-box">
                <div class="cube3d" id="cube-toggle-btn">
                    <div class="cube3d-inner">
                        <div class="cube3d-face cube3d-front"></div>
                        <div class="cube3d-face cube3d-back"></div>
                        <div class="cube3d-face cube3d-right"></div>
                        <div class="cube3d-face cube3d-left"></div>
                        <div class="cube3d-face cube3d-top"></div>
                        <div class="cube3d-face cube3d-bottom"></div>
                    </div>
                </div>
                <div class="cube-menu" id="cube-menu" style="display: none">
                    <a href="/" class="cube-menu-item">Home</a>
                    <a
                        href="https://github.com/team-toyotech/"
                        class="cube-menu-item"
                        target="_blank"
                        rel="noopener noreferrer"
                        >GitHub</a
                    >
                    <a href="/compiler/" class="cube-menu-item">Online</a>
                    <a href="/download/" class="cube-menu-item">Download</a>
                </div>
            </div>
        </main>
        <footer class="main-footer">
            <p>
                &copy; <span id="yearNow"></span> Team ToyoTech. All rights
                reserved.
            </p>
        </footer>
    </body>
</html>
